<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>SplitBill</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
<style>
  :root {
    --purple-50:#EEEDFE;--purple-200:#AFA9EC;--purple-600:#534AB7;--purple-800:#3C3489;
    --green-50:#EAF3DE;--green-800:#27500A;--red-50:#FCEBEB;--red-800:#791F1F;
    --bg:#ffffff;--bg2:#f5f5f3;--bg3:#efede8;
    --text:#1a1a18;--text2:#5f5e5a;--text3:#888780;
    --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
    --radius:10px;--radius-lg:14px;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --ck-bg:#ffffff;--ck-border:#888780;--ck-on:#534AB7;--ck-tick:#ffffff;
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
    --text:#f0ede8;--text2:#a8a59f;--text3:#6e6c67;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.22);
    --purple-50:#26215C;--purple-200:#534AB7;--purple-800:#EEEDFE;
    --green-50:#173404;--green-800:#C0DD97;--red-50:#501313;--red-800:#F7C1C1;
    --ck-bg:#3a3a38;--ck-border:#a8a59f;--ck-on:#7F77DD;--ck-tick:#ffffff;
  }}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:var(--bg3);font-family:var(--font);color:var(--text);}
  #app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg3);}
  .screen{display:none;padding:0 0 90px;}
  .screen.active{display:block;}
  .top-bar{display:flex;align-items:center;gap:10px;padding:16px 16px 0;margin-bottom:20px;}
  .top-bar h2{font-size:18px;font-weight:600;color:var(--text);flex:1;}
  .back-btn{background:none;border:none;cursor:pointer;color:var(--text2);font-size:22px;padding:4px;border-radius:8px;}
  .page-pad{padding:0 16px;}
  .card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:12px;}
  .btn-primary{width:100%;padding:14px;background:var(--purple-800);color:var(--purple-50);border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn-primary:active{opacity:0.85;transform:scale(0.98);}
  .btn-secondary{width:100%;padding:12px;background:none;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:14px;color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
  .btn-small{padding:8px 14px;background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--radius);font-size:14px;color:var(--text);cursor:pointer;white-space:nowrap;}
  .btn-danger{padding:6px 8px;background:none;border:none;color:#A32D2D;cursor:pointer;font-size:18px;}
  label{font-size:13px;color:var(--text2);display:block;margin-bottom:6px;margin-top:14px;}
  input,select{width:100%;padding:11px 13px;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:15px;background:var(--bg2);color:var(--text);font-family:var(--font);appearance:none;-webkit-appearance:none;}
  input:focus,select:focus{outline:2px solid var(--purple-600);outline-offset:1px;}
  .section-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:10px;}
  .avatar{width:38px;height:38px;border-radius:50%;background:var(--purple-50);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--purple-800);flex-shrink:0;}
  .avatar.green{background:var(--green-50);color:var(--green-800);}
  .member-row{display:flex;align-items:center;gap:10px;padding:6px 0;}
  .member-name{flex:1;font-size:15px;color:var(--text);}
  .trip-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:10px;cursor:pointer;}
  .trip-card:active{background:var(--bg2);}
  .trip-code-pill{font-size:11px;color:var(--purple-600);background:var(--purple-50);padding:2px 8px;border-radius:20px;display:inline-block;margin-top:4px;letter-spacing:0.05em;}
  .tab-bar{display:flex;border-bottom:0.5px solid var(--border);margin:0 16px 16px;}
  .tab{flex:1;padding:10px 4px;text-align:center;font-size:13px;font-weight:500;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;}
  .tab.active{color:var(--purple-800);border-bottom-color:var(--purple-800);}
  .expense-row{display:flex;justify-content:space-between;align-items:flex-start;padding:12px 0;border-bottom:0.5px solid var(--border);}
  .expense-row:last-child{border-bottom:none;}
  .exp-title{font-size:15px;font-weight:500;color:var(--text);}
  .exp-meta{font-size:12px;color:var(--text2);margin-top:3px;}
  .exp-amt{font-size:15px;font-weight:600;color:var(--text);text-align:right;}
  .exp-sub{font-size:11px;color:var(--text3);text-align:right;margin-top:2px;}
  .stat-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin:0 16px 12px;}
  .stat-card{background:var(--bg);border-radius:var(--radius);padding:14px;border:0.5px solid var(--border);}
  .stat-label{font-size:12px;color:var(--text2);}
  .stat-val{font-size:20px;font-weight:600;color:var(--text);margin-top:4px;}
  .balance-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:0.5px solid var(--border);}
  .balance-row:last-child{border-bottom:none;}
  .badge{font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;}
  .badge-owes{background:var(--red-50);color:var(--red-800);}
  .badge-gets{background:var(--green-50);color:var(--green-800);}
  .badge-settled{background:var(--bg2);color:var(--text3);}
  .settle-row{display:flex;align-items:center;gap:8px;padding:10px 0;border-bottom:0.5px solid var(--border);font-size:14px;flex-wrap:wrap;}
  .settle-row:last-child{border-bottom:none;}
  .settle-amt{font-weight:600;color:var(--purple-800);}
  .split-mode-row{display:flex;gap:8px;margin-top:8px;}
  .split-btn{flex:1;padding:10px;border:0.5px solid var(--border2);border-radius:var(--radius);font-size:14px;font-weight:500;background:none;color:var(--text2);cursor:pointer;}
  .split-btn.active{background:var(--purple-50);color:var(--purple-800);border-color:var(--purple-200);}
  .empty{text-align:center;padding:40px 20px;color:var(--text2);}
  .empty i{font-size:40px;display:block;margin-bottom:12px;color:var(--text3);}
  .empty p{font-size:14px;}
  .fab{position:fixed;bottom:24px;right:50%;transform:translateX(50%);max-width:calc(430px - 32px);width:calc(100% - 32px);z-index:10;}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#2C2C2A;color:#f0ede8;padding:10px 20px;border-radius:20px;font-size:14px;z-index:100;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap;}
  .toast.show{opacity:1;}
  .app-header{padding:52px 16px 8px;}
  .app-header h1{font-size:28px;font-weight:700;color:var(--text);}
  .app-header p{font-size:14px;color:var(--text2);margin-top:4px;}
  .currency-pill{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;background:var(--purple-50);color:var(--purple-800);margin-left:6px;vertical-align:middle;}

  /* CUSTOM CHECKBOX — dark mode visible */
  .check-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:0.5px solid var(--border);cursor:pointer;user-select:none;}
  .check-row:last-child{border-bottom:none;}
  .check-row:active{background:var(--bg2);margin:0 -16px;padding:12px 16px;}
  .check-row input[type=checkbox]{display:none;}
  .ck-box{width:26px;height:26px;border-radius:7px;border:2px solid var(--ck-border);background:var(--ck-bg);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.12s;}
  .ck-box.on{background:var(--ck-on);border-color:var(--ck-on);}
  .ck-box.on::after{content:'';width:6px;height:11px;border:2.5px solid var(--ck-tick);border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px);display:block;}
  .ck-label{font-size:15px;color:var(--text);flex:1;}

  /* EXPENSE TABLE */
  .exp-table{width:100%;border-collapse:collapse;font-size:13px;}
  .exp-table th{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.05em;padding:6px 6px 8px;border-bottom:1px solid var(--border2);text-align:left;}
  .exp-table th.r,.exp-table td.r{text-align:right;}
  .exp-table th.c,.exp-table td.c{text-align:center;}
  .exp-table td{padding:10px 6px;border-bottom:0.5px solid var(--border);color:var(--text);vertical-align:top;}
  .exp-table tr:last-child td{border-bottom:none;}
  .td-sub{font-size:11px;color:var(--text3);margin-top:2px;}
  .td-bold{font-weight:600;}
  .exp-table tfoot td{font-weight:600;font-size:13px;padding-top:12px;border-top:1px solid var(--border2);border-bottom:none;}
</style>
</head>
<body>
<div id="app">
<div id="toast" class="toast"></div>

<!-- HOME -->
<div id="s-home" class="screen active">
  <div class="app-header"><h1>💸 SplitBill</h1><p>Split trip costs, zero drama.</p></div>
  <div class="page-pad" style="margin-top:16px;"><div id="trip-list"></div></div>
  <div class="fab"><button class="btn-primary" onclick="goNewTrip()"><i class="ti ti-plus"></i> New trip</button></div>
</div>

<!-- NEW TRIP -->
<div id="s-new-trip" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="go('s-home')"><i class="ti ti-arrow-left"></i></button>
    <h2>New trip</h2>
  </div>
  <div class="page-pad">
    <div class="card">
      <label>Trip name</label>
      <input id="nt-name" type="text" placeholder="e.g. Bali 2026, Family Genting" autocomplete="off" />
      <label>Base currency</label>
      <select id="nt-currency">
        <option value="MYR">MYR — Malaysian Ringgit</option>
        <option value="SGD">SGD — Singapore Dollar</option>
        <option value="USD">USD — US Dollar</option>
        <option value="JPY">JPY — Japanese Yen</option>
        <option value="EUR">EUR — Euro</option>
        <option value="THB">THB — Thai Baht</option>
        <option value="IDR">IDR — Indonesian Rupiah</option>
        <option value="AUD">AUD — Australian Dollar</option>
        <option value="GBP">GBP — British Pound</option>
        <option value="KRW">KRW — Korean Won</option>
        <option value="CNY">CNY — Chinese Yuan</option>
      </select>
    </div>
    <div class="card">
      <p class="section-label">Members</p>
      <div id="nt-members"></div>
      <div style="display:flex;gap:8px;margin-top:10px;">
        <input id="nt-member-inp" type="text" placeholder="Add member name" style="margin:0;" autocomplete="off" onkeydown="if(event.key==='Enter')addNewMember()" />
        <button class="btn-small" onclick="addNewMember()"><i class="ti ti-plus"></i> Add</button>
      </div>
      <p id="nt-member-hint" style="font-size:12px;color:var(--text3);margin-top:8px;">Add at least 2 members</p>
    </div>
    <button class="btn-primary" onclick="createTrip()"><i class="ti ti-check"></i> Create trip</button>
  </div>
</div>

<!-- TRIP DETAIL -->
<div id="s-trip" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="go('s-home')"><i class="ti ti-arrow-left"></i></button>
    <h2 id="trip-title">Trip</h2>
    <span id="trip-cur-pill" class="currency-pill">MYR</span>
  </div>
  <div class="tab-bar">
    <div class="tab active" id="tab-expenses" onclick="switchTab('expenses')">Expenses</div>
    <div class="tab" id="tab-balances" onclick="switchTab('balances')">Balances</div>
    <div class="tab" id="tab-settle" onclick="switchTab('settle')">Settle up</div>
  </div>
  <div id="pane-expenses"></div>
  <div id="pane-balances" style="display:none;"></div>
  <div id="pane-settle" style="display:none;"></div>
  <div class="fab" id="fab-trip">
    <button class="btn-primary" onclick="go('s-add-expense')"><i class="ti ti-plus"></i> Add expense</button>
  </div>
</div>

<!-- ADD EXPENSE -->
<div id="s-add-expense" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="go('s-trip')"><i class="ti ti-arrow-left"></i></button>
    <h2>Add expense</h2>
  </div>
  <div class="page-pad">
    <div class="card">
      <label>Description</label>
      <input id="ae-desc" type="text" placeholder="e.g. Hotel, Dinner, Bus tickets" autocomplete="off" />
      <label>Amount</label>
      <div style="display:flex;gap:8px;">
        <select id="ae-currency" style="width:100px;flex-shrink:0;"></select>
        <input id="ae-amount" type="number" placeholder="0.00" min="0" step="0.01" style="flex:1;" />
      </div>
      <label>Paid by</label>
      <select id="ae-paidby"></select>
    </div>
    <div class="card">
      <p class="section-label">Split between</p>
      <div class="split-mode-row">
        <button class="split-btn active" id="sb-equal" onclick="setSplitMode('equal')">Everyone equally</button>
        <button class="split-btn" id="sb-custom" onclick="setSplitMode('custom')">Select pax</button>
      </div>
      <div id="ae-equal-info" style="margin-top:10px;font-size:13px;color:var(--text2);">
        <i class="ti ti-users" style="vertical-align:-2px;margin-right:4px;"></i>Split equally among all members
      </div>
      <div id="ae-custom-pax" style="display:none;margin-top:10px;">
        <p style="font-size:13px;color:var(--text2);margin-bottom:4px;">Who shares this cost?</p>
        <div id="ae-pax-checks"></div>
        <p id="ae-per-pax" style="font-size:13px;color:var(--purple-800);margin-top:12px;font-weight:600;"></p>
      </div>
    </div>
    <button class="btn-primary" onclick="saveExpense()"><i class="ti ti-device-floppy"></i> Save expense</button>
  </div>
</div>

</div>
<script>
const CURRENCIES=['MYR','SGD','USD','JPY','EUR','THB','IDR','AUD','GBP','KRW','CNY'];
const FX={MYR:1,SGD:3.52,USD:4.72,JPY:0.031,EUR:5.20,THB:0.13,IDR:0.00030,AUD:3.02,GBP:5.98,KRW:0.0034,CNY:0.65};
let trips=JSON.parse(localStorage.getItem('splitbill_v2')||'[]');
let cur=null,newMembers=[],splitMode='equal',activeTab='expenses';

function save(){localStorage.setItem('splitbill_v2',JSON.stringify(trips));}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
  if(id==='s-home')renderHome();
  if(id==='s-trip')renderTrip();
  if(id==='s-add-expense')setupAddExpense();
}

function toBase(amt,from,base){return amt*FX[from]/FX[base];}

function renderHome(){
  const el=document.getElementById('trip-list');
  if(!trips.length){el.innerHTML='<div class="empty"><i class="ti ti-map-pin"></i><p>No trips yet.<br>Create your first one!</p></div>';return;}
  el.innerHTML=trips.map(t=>{
    const total=t.expenses.reduce((s,e)=>s+toBase(e.amount,e.currency,t.currency),0);
    return`<div class="trip-card" onclick="openTrip(${t.id})">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div style="flex:1;">
          <p style="font-size:16px;font-weight:600;color:var(--text);">${t.name}</p>
          <p style="font-size:13px;color:var(--text2);margin-top:3px;">${t.members.length} members · ${t.expenses.length} expenses</p>
          <span class="trip-code-pill">Code: ${t.code}</span>
        </div>
        <div>
          <p style="font-size:16px;font-weight:600;color:var(--text);text-align:right;">${t.currency} ${total.toFixed(2)}</p>
          <p style="font-size:12px;color:var(--text3);text-align:right;margin-top:3px;">${t.members.join(', ').substring(0,26)}${t.members.join(', ').length>26?'…':''}</p>
        </div>
      </div>
    </div>`;
  }).join('');
}

function goNewTrip(){
  newMembers=[];
  document.getElementById('nt-name').value='';
  document.getElementById('nt-member-inp').value='';
  renderNewMembers();go('s-new-trip');
}

function renderNewMembers(){
  document.getElementById('nt-members').innerHTML=newMembers.map((m,i)=>
    `<div class="member-row">
      <div class="avatar">${ini(m)}</div>
      <span class="member-name">${m}</span>
      <button class="btn-danger" onclick="removeNewMember(${i})"><i class="ti ti-x"></i></button>
    </div>`).join('');
  document.getElementById('nt-member-hint').textContent=
    newMembers.length<2?'Add at least 2 members':`${newMembers.length} members added`;
}

function addNewMember(){
  const inp=document.getElementById('nt-member-inp');
  const name=inp.value.trim();
  if(!name)return;
  if(newMembers.includes(name)){showToast('Already added');return;}
  newMembers.push(name);inp.value='';renderNewMembers();
}
function removeNewMember(i){newMembers.splice(i,1);renderNewMembers();}

function createTrip(){
  const name=document.getElementById('nt-name').value.trim();
  const currency=document.getElementById('nt-currency').value;
  if(!name){showToast('Enter a trip name');return;}
  if(newMembers.length<2){showToast('Add at least 2 members');return;}
  const code=Math.random().toString(36).slice(2,8).toUpperCase();
  const trip={id:Date.now(),name,currency,code,members:[...newMembers],expenses:[]};
  trips.unshift(trip);save();cur=trip;activeTab='expenses';go('s-trip');
}

function openTrip(id){cur=trips.find(t=>t.id===id);activeTab='expenses';go('s-trip');}

function switchTab(tab){
  activeTab=tab;
  ['expenses','balances','settle'].forEach(t=>{
    document.getElementById(`tab-${t}`).classList.toggle('active',t===tab);
    document.getElementById(`pane-${t}`).style.display=t===tab?'':'none';
  });
  document.getElementById('fab-trip').style.display=tab==='expenses'?'':'none';
  if(tab==='expenses')renderExpenses();
  if(tab==='balances')renderBalances();
  if(tab==='settle')renderSettle();
}

function renderTrip(){
  document.getElementById('trip-title').textContent=cur.name;
  document.getElementById('trip-cur-pill').textContent=cur.currency;
  ['expenses','balances','settle'].forEach(t=>{
    document.getElementById(`tab-${t}`).classList.toggle('active',t===activeTab);
    document.getElementById(`pane-${t}`).style.display=t===activeTab?'':'none';
  });
  document.getElementById('fab-trip').style.display=activeTab==='expenses'?'':'none';
  if(activeTab==='expenses')renderExpenses();
  if(activeTab==='balances')renderBalances();
  if(activeTab==='settle')renderSettle();
}

function renderExpenses(){
  const el=document.getElementById('pane-expenses');
  if(!cur.expenses.length){el.innerHTML='<div class="empty"><i class="ti ti-receipt"></i><p>No expenses yet.<br>Tap + to add one.</p></div>';return;}
  el.innerHTML='<div class="page-pad"><div class="card">'+
    cur.expenses.map((e,i)=>{
      const base=toBase(e.amount,e.currency,cur.currency);
      const pax=e.splitAmong||cur.members;
      const pp=(base/pax.length).toFixed(2);
      return`<div class="expense-row">
        <div style="flex:1;padding-right:10px;">
          <p class="exp-title">${e.desc}</p>
          <p class="exp-meta">Paid by ${e.paidBy} · ${pax.length} pax</p>
        </div>
        <div>
          <p class="exp-amt">${e.currency} ${parseFloat(e.amount).toFixed(2)}</p>
          ${e.currency!==cur.currency?`<p class="exp-sub">≈${cur.currency} ${base.toFixed(2)}</p>`:''}
          <p class="exp-sub">${cur.currency} ${pp}/pax</p>
          <button class="btn-danger" onclick="deleteExpense(${i})" style="padding:4px 0;font-size:16px;"><i class="ti ti-trash"></i></button>
        </div>
      </div>`;
    }).join('')+'</div></div>';
}

function deleteExpense(i){
  if(!confirm(`Delete "${cur.expenses[i].desc}"?`))return;
  cur.expenses.splice(i,1);save();renderExpenses();
}

function getBal(){
  const bal={};
  cur.members.forEach(m=>bal[m]=0);
  cur.expenses.forEach(e=>{
    const base=toBase(e.amount,e.currency,cur.currency);
    const pax=e.splitAmong||cur.members;
    const share=base/pax.length;
    bal[e.paidBy]=(bal[e.paidBy]||0)+base;
    pax.forEach(m=>{bal[m]=(bal[m]||0)-share;});
  });
  return bal;
}

function getSettlements(bal){
  const creds=[],debts=[];
  Object.entries(bal).forEach(([n,v])=>{
    if(v>0.005)creds.push({n,v:+v.toFixed(2)});
    else if(v<-0.005)debts.push({n,v:+(-v).toFixed(2)});
  });
  const out=[];let ci=0,di=0;
  creds.sort((a,b)=>b.v-a.v);debts.sort((a,b)=>b.v-a.v);
  while(ci<creds.length&&di<debts.length){
    const pay=Math.min(creds[ci].v,debts[di].v);
    if(pay>0.005)out.push({from:debts[di].n,to:creds[ci].n,amt:+pay.toFixed(2)});
    creds[ci].v=+(creds[ci].v-pay).toFixed(2);
    debts[di].v=+(debts[di].v-pay).toFixed(2);
    if(creds[ci].v<0.005)ci++;
    if(debts[di].v<0.005)di++;
  }
  return out;
}

function renderBalances(){
  const bal=getBal();
  const total=cur.expenses.reduce((s,e)=>s+toBase(e.amount,e.currency,cur.currency),0);
  const avg=cur.members.length?total/cur.members.length:0;
  let html=`<div class="stat-grid">
    <div class="stat-card"><p class="stat-label">Total spent</p><p class="stat-val">${cur.currency} ${total.toFixed(2)}</p></div>
    <div class="stat-card"><p class="stat-label">Per person avg</p><p class="stat-val">${cur.currency} ${avg.toFixed(2)}</p></div>
  </div><div class="page-pad"><div class="card"><p class="section-label" style="margin-bottom:12px;">Individual balances</p>`;
  html+=cur.members.map(m=>{
    const v=bal[m]||0;
    let bc,bt;
    if(v>0.005){bc='badge-gets';bt=`+${cur.currency} ${v.toFixed(2)}`;}
    else if(v<-0.005){bc='badge-owes';bt=`-${cur.currency} ${Math.abs(v).toFixed(2)}`;}
    else{bc='badge-settled';bt='settled ✓';}
    return`<div class="balance-row">
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="avatar">${ini(m)}</div>
        <span style="font-size:15px;">${m}</span>
      </div>
      <span class="badge ${bc}">${bt}</span>
    </div>`;
  }).join('');
  html+='</div></div>';
  document.getElementById('pane-balances').innerHTML=html;
}

function renderSettle(){
  const bal=getBal();
  const settlements=getSettlements(bal);
  const total=cur.expenses.reduce((s,e)=>s+toBase(e.amount,e.currency,cur.currency),0);
  let html='<div class="page-pad">';

  // Who pays whom
  html+='<div class="card"><p class="section-label" style="margin-bottom:12px;">Who pays whom</p>';
  if(!settlements.length){
    html+='<div style="padding:12px 0;text-align:center;color:var(--text2);font-size:14px;">🎉 Everyone is settled!</div>';
  }else{
    html+=settlements.map(s=>`<div class="settle-row">
      <div class="avatar" style="width:32px;height:32px;font-size:11px;">${ini(s.from)}</div>
      <span style="flex:1;font-weight:500;">${s.from}</span>
      <span style="color:var(--text3);font-size:12px;">pays</span>
      <span class="settle-amt">${cur.currency} ${s.amt.toFixed(2)}</span>
      <span style="color:var(--text3);font-size:12px;">to</span>
      <div class="avatar green" style="width:32px;height:32px;font-size:11px;">${ini(s.to)}</div>
      <span style="font-weight:500;">${s.to}</span>
    </div>`).join('');
  }
  html+='</div>';

  // Expense table
  html+='<div class="card"><p class="section-label" style="margin-bottom:10px;">Expense breakdown</p><div style="overflow-x:auto;"><table class="exp-table"><thead><tr><th>Item</th><th>Paid by</th><th class="c">Pax</th><th class="r">Amount</th></tr></thead><tbody>';
  cur.expenses.forEach(e=>{
    const base=toBase(e.amount,e.currency,cur.currency);
    const pax=e.splitAmong||cur.members;
    const pp=(base/pax.length).toFixed(2);
    html+=`<tr>
      <td><div>${e.desc}</div><div class="td-sub">${cur.currency} ${pp}/pax</div></td>
      <td style="white-space:nowrap;">${e.paidBy}</td>
      <td class="c">${pax.length}</td>
      <td class="r td-bold">${e.currency} ${parseFloat(e.amount).toFixed(2)}${e.currency!==cur.currency?`<div class="td-sub">≈${cur.currency} ${base.toFixed(2)}</div>`:''}</td>
    </tr>`;
  });
  html+=`</tbody><tfoot><tr><td colspan="3">Total</td><td class="r">${cur.currency} ${total.toFixed(2)}</td></tr></tfoot></table></div></div>`;

  html+=`<button class="btn-secondary" onclick="shareTrip()" style="margin-top:4px;"><i class="ti ti-share"></i> Share summary</button>
  <button class="btn-danger" onclick="deleteTrip()" style="width:100%;margin-top:10px;padding:10px;border:0.5px solid var(--border);border-radius:var(--radius);font-size:14px;display:flex;align-items:center;justify-content:center;gap:6px;"><i class="ti ti-trash"></i> Delete trip</button>
  </div>`;
  document.getElementById('pane-settle').innerHTML=html;
}

function deleteTrip(){
  if(!confirm(`Delete "${cur.name}"? This cannot be undone.`))return;
  trips=trips.filter(t=>t.id!==cur.id);save();go('s-home');
}

function shareTrip(){
  const bal=getBal();
  const settlements=getSettlements(bal);
  const total=cur.expenses.reduce((s,e)=>s+toBase(e.amount,e.currency,cur.currency),0);
  let text=`💸 ${cur.name} — Trip Summary\nCode: ${cur.code}\nTotal: ${cur.currency} ${total.toFixed(2)} · ${cur.members.length} members\n\n💰 Settle up:\n`;
  if(!settlements.length){text+='• Everyone is settled!\n';}
  else{settlements.forEach(s=>{text+=`• ${s.from} → pays ${cur.currency} ${s.amt.toFixed(2)} → ${s.to}\n`;});}
  text+=`\n📋 Expenses (${cur.expenses.length}):\n`;
  const col1=18,col2=12;
  text+=`${'Item'.padEnd(col1)}${'Paid by'.padEnd(col2)}Pax  Amount\n${'─'.repeat(48)}\n`;
  cur.expenses.forEach(e=>{
    const base=toBase(e.amount,e.currency,cur.currency);
    const pax=e.splitAmong||cur.members;
    text+=`${e.desc.substring(0,col1-1).padEnd(col1)}${e.paidBy.substring(0,col2-1).padEnd(col2)}${String(pax.length).padEnd(5)}${e.currency} ${parseFloat(e.amount).toFixed(2)}\n`;
  });
  text+=`${'─'.repeat(48)}\n${'TOTAL'.padEnd(col1+col2+5)}${cur.currency} ${total.toFixed(2)}\n\nGenerated by SplitBill`;
  if(navigator.share){navigator.share({title:cur.name,text}).catch(()=>fallbackCopy(text));}
  else{fallbackCopy(text);}
}

function fallbackCopy(text){
  if(navigator.clipboard){navigator.clipboard.writeText(text).then(()=>showToast('Copied to clipboard!'));}
  else{alert(text);}
}

function setupAddExpense(){
  splitMode='equal';
  document.getElementById('ae-desc').value='';
  document.getElementById('ae-amount').value='';
  document.getElementById('sb-equal').classList.add('active');
  document.getElementById('sb-custom').classList.remove('active');
  document.getElementById('ae-equal-info').style.display='';
  document.getElementById('ae-custom-pax').style.display='none';
  document.getElementById('ae-currency').innerHTML=CURRENCIES.map(c=>`<option${c===cur.currency?' selected':''}>${c}</option>`).join('');
  document.getElementById('ae-paidby').innerHTML=cur.members.map(m=>`<option>${m}</option>`).join('');
  renderPaxChecks();updatePerPax();
}

function renderPaxChecks(){
  document.getElementById('ae-pax-checks').innerHTML=cur.members.map(m=>{
    const sid=`ck_${m.replace(/\W/g,'_')}`;
    return`<div class="check-row" onclick="toggleCk('${sid}')">
      <input type="checkbox" id="${sid}" value="${m}" checked />
      <div class="ck-box on" id="v${sid}"></div>
      <span class="ck-label">${m}</span>
    </div>`;
  }).join('');
}

function toggleCk(sid){
  const cb=document.getElementById(sid);
  const vis=document.getElementById('v'+sid);
  cb.checked=!cb.checked;
  vis.classList.toggle('on',cb.checked);
  updatePerPax();
}

function setSplitMode(mode){
  splitMode=mode;
  document.getElementById('sb-equal').classList.toggle('active',mode==='equal');
  document.getElementById('sb-custom').classList.toggle('active',mode==='custom');
  document.getElementById('ae-equal-info').style.display=mode==='equal'?'':'none';
  document.getElementById('ae-custom-pax').style.display=mode==='custom'?'':'none';
  updatePerPax();
}

function updatePerPax(){
  const amt=parseFloat(document.getElementById('ae-amount').value)||0;
  const checked=[...document.querySelectorAll('#ae-pax-checks input:checked')];
  const n=splitMode==='custom'?checked.length:cur.members.length;
  const cc=document.getElementById('ae-currency').value;
  const pp=document.getElementById('ae-per-pax');
  if(pp)pp.textContent=n>0&&amt>0?`${cc} ${(amt/n).toFixed(2)} per person (${n} pax)`:'';
}

document.getElementById('ae-amount').addEventListener('input',updatePerPax);
document.getElementById('ae-currency').addEventListener('change',updatePerPax);

function saveExpense(){
  const desc=document.getElementById('ae-desc').value.trim();
  const amount=parseFloat(document.getElementById('ae-amount').value);
  const currency=document.getElementById('ae-currency').value;
  const paidBy=document.getElementById('ae-paidby').value;
  if(!desc){showToast('Enter a description');return;}
  if(!amount||amount<=0){showToast('Enter a valid amount');return;}
  let splitAmong=null;
  if(splitMode==='custom'){
    splitAmong=[...document.querySelectorAll('#ae-pax-checks input:checked')].map(c=>c.value);
    if(!splitAmong.length){showToast('Select at least 1 person');return;}
  }
  cur.expenses.push({desc,amount,currency,paidBy,splitAmong});
  save();showToast(`${desc} saved ✓`);go('s-trip');
}

function ini(name){return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();}

renderHome();
</script>
